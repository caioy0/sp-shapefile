<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Comarcas - TJSP</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">


</head>
<body>

    <div id="container-filtro">
        
        <div class="bloco-entrada">
            <label for="seletor-raj">Filtrar por Região (RAJ)</label>
            <select id="seletor-raj" onchange="filtrarRegiao(this.value)">
                <option value="todas">Mostrar Todas as Regiões</option>
                <option value="1ª RAJ">1ª RAJ - Grande São Paulo</option>
                <option value="2ª RAJ">2ª RAJ - Araçatuba</option>
                <option value="3ª RAJ">3ª RAJ - Bauru</option>
                <option value="4ª RAJ">4ª RAJ - Campinas</option>
                <option value="5ª RAJ">5ª RAJ - Presidente Prudente</option>
                <option value="6ª RAJ">6ª RAJ - Ribeirão Preto</option>
                <option value="7ª RAJ">7ª RAJ - Santos</option>
                <option value="8ª RAJ">8ª RAJ - São José do Rio Preto</option>
                <option value="9ª RAJ">9ª RAJ - São José dos Campos</option>
                <option value="10ª RAJ">10ª RAJ - Sorocaba</option>
            </select>
        </div>

        <hr class="divisor">

        <div class="bloco-entrada">
            <label for="busca-comarca">Buscar Comarca</label>
            <input type="text" id="busca-comarca" placeholder="🔍 Ex: Urupês...">
        </div>

    </div>

    <div id="meu-mapa"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Inicializa o mapa focado provisoriamente no Sudeste
        var map = L.map('meu-mapa').setView([-22.5, -48.5], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Paleta oficial de cores do nosso mapa
        function obterCor(regiao) {
            if (!regiao) return '#cccccc'; 
            var texto = String(regiao).toLowerCase();

            if (texto.includes('1ª')) return '#8dd3c7'; // Grande SP
            if (texto.includes('2ª')) return '#ffffb3'; // Araçatuba
            if (texto.includes('3ª')) return '#bebada'; // Bauru
            if (texto.includes('4ª')) return '#fb8072'; // Campinas
            if (texto.includes('5ª')) return '#80b1d3'; // Pres. Prudente
            if (texto.includes('6ª')) return '#fdb462'; // Ribeirão Preto
            if (texto.includes('7ª')) return '#b3de69'; // Santos
            if (texto.includes('8ª')) return '#fccde5'; // S. J. do Rio Preto
            if (texto.includes('9ª')) return '#d9d9d9'; // S. J. dos Campos
            if (texto.includes('10ª')) return '#bc80bd'; // Sorocaba
            
            return '#cccccc';
        }

        // Variáveis de controle para o filtro e câmera
        var dadosGlobais = null;
        var geojsonLayer = null;
        var primeiraCarga = true;

        // Puxa o seu arquivo (ajustado para ler .json ou .geojson)
        fetch('comarcas.json')
            .then(function(response) {
                return response.json();
            })
            .then(function(dadosGeoJSON) {
                dadosGlobais = dadosGeoJSON; // Guarda os dados para usar no filtro depois
                desenharCamada('todas');     // Desenha o mapa inicial completo
            })
            .catch(function(erro) {
                console.error("Ops! Erro ao carregar o arquivo:", erro);
            });

        // Função responsável por desenhar as comarcas na tela
        function desenharCamada(regiaoSelecionada) {
            // Se já existir um mapa desenhado, apaga ele antes de desenhar o novo
            if (geojsonLayer) {
                map.removeLayer(geojsonLayer);
            }

            geojsonLayer = L.geoJSON(dadosGlobais, {
                // Filtro: só desenha o polígono se ele corresponder à RAJ escolhida
                filter: function(feature) {
                    if (regiaoSelecionada === 'todas') return true;
                    var reg = feature.properties.raj_sigla || feature.properties.RAJ_SIGLA;
                    return reg === regiaoSelecionada;
                },
                style: function(feature) {
                    var props = feature.properties || {};
                    var reg = props.raj_sigla || props.RAJ_SIGLA || props.id_raj;
                    return {
                        fillColor: obterCor(reg), 
                        weight: 1,        
                        color: "#333333", // Cor da borda
                        fillOpacity: 0.7 
                    };
                },
                onEachFeature: function (feature, layer) {
                    var props = feature.properties || {};
                    var nomeDaComarca = props.comarca_tjsp || props.COMARCA_TJSP || "Sem nome";
                    
                    // Exibe o balãozinho clássico (Tooltip) ao passar o mouse
                    layer.bindTooltip("<b>Comarca:</b> " + nomeDaComarca, {
                        sticky: true 
                    });
                    layer.on("mouseover", function () {

                    this.setStyle({
                        fillColor: "#3b82f6",
                        color: "#1d4ed8",
                        weight: 3,
                        fillOpacity: 0.9
                    });

                        this.bringToFront();

                    });

                    layer.on("mouseout", function () {

                        geojsonLayer.resetStyle(this);

                    });

                    // Exibe o Raio-X completo em um popup ao clicar!
                    layer.on('click', function() {
                       var conteudo = `
<div class="popup-comarca">

    <div class="popup-titulo">
        ${nomeDaComarca}
    </div>

    <div class="popup-item">
        <span>🏛 Região</span>
        <strong>${props.raj_nome || "Não informada"}</strong>
    </div>

    <div class="popup-item">
        <span>📍 Circunscrição</span>
        <strong>${props.cj_nome || "Não informada"}</strong>
    </div>

    <div class="popup-item">
        <span>👨‍⚖️ Diretor(a)</span>
        <strong>${props.juiz_diretor_nome || "Não informado"}</strong>
    </div>

    <div class="popup-item">
        <span>📧 E-mail</span>
        <a href="mailto:${props.juiz_diretor_email}">
            ${props.juiz_diretor_email || "-"}
        </a>
    </div>

</div>
`;
                        
                        layer.bindPopup(conteudo).openPopup();
                    });
                }
            }).addTo(map);

            // O PULO DO GATO: Na primeira carga, ajusta o foco do mapa perfeitamente no estado de SP!
            if (primeiraCarga && geojsonLayer.getBounds().isValid()) {
                map.fitBounds(geojsonLayer.getBounds());
                primeiraCarga = false; // Desativa para não ficar mudando a câmera toda hora que filtrar
            }
        }

        // Função disparada quando você muda a opção no menu suspenso
        function filtrarRegiao(rajEscolhida) {
            desenharCamada(rajEscolhida);
        }

        document.getElementById("busca-comarca").addEventListener("keyup", function(e){

    if(e.key !== "Enter") return;

    var texto = this.value.toLowerCase();

    geojsonLayer.eachLayer(function(layer){

        var props = layer.feature.properties;

        var nome =
            (props.comarca_tjsp ||
             props.COMARCA_TJSP ||
             "").toLowerCase();

        if(nome.includes(texto)){

            map.fitBounds(layer.getBounds());

            layer.openPopup();

        }

    });

});


        // Criando e adicionando a legenda no canto inferior direito
        var legenda = L.control({ position: 'bottomright' });

        legenda.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            var rajs = [
                '1ª RAJ', '2ª RAJ', '3ª RAJ', '4ª RAJ', '5ª RAJ', 
                '6ª RAJ', '7ª RAJ', '8ª RAJ', '9ª RAJ', '10ª RAJ'
            ];
            
            div.innerHTML = '<h4>Regiões (RAJ)</h4>';
            
            for (var i = 0; i < rajs.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + obterCor(rajs[i]) + '"></i> ' +
                    rajs[i] + '<br>';
            }
            return div;
        };

        legenda.addTo(map);
    </script>
</body>
</html>
